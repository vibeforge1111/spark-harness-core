name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: read
  pull-requests: read

jobs:
  test-and-audit:
    name: test-and-audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Typecheck TypeScript
        run: npm run typecheck

      - name: Build TypeScript packages
        run: npm run build

      - name: Checkout spark-telegram-bot vendor
        uses: actions/checkout@v6
        with:
          repository: vibeforge1111/spark-telegram-bot
          path: consumers/spark-telegram-bot

      - name: Checkout spawner-ui vendor
        uses: actions/checkout@v6
        with:
          repository: vibeforge1111/vibeship-spawner-ui
          path: consumers/spawner-ui

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Verify vendored distribution drift
        run: python scripts/verify_distribution_drift.py --consumer bot=consumers/spark-telegram-bot --consumer spawner=consumers/spawner-ui

      - name: Install Python test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest

      - name: Run Python tests
        run: python -m pytest tests

      - name: Run schema healthcheck
        run: python -c "from spark_harness_core.schemas import check_all_schemas; check_all_schemas(); print('spark-harness-core ok')"

  conformance:
    name: conformance
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Build TypeScript packages
        run: npm run build

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python conformance dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest

      - name: Run Python conformance vectors
        run: python -m pytest tests/test_conformance.py -q

      - name: Run consumer integration conformance kit
        run: python -m spark_harness_core.consumer_conformance --fixture good

      - name: Prove consumer integration conformance kit catches failures
        run: |
          if python -m spark_harness_core.consumer_conformance --fixture broken; then
            echo "broken consumer conformance fixture unexpectedly passed"
            exit 1
          fi

      - name: Run TypeScript conformance vectors
        run: node scripts/run-conformance.mjs

  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
