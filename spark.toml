[module]
name = "spark-harness-core"
version = "0.1.0"
kind = "runtime"
plane = "authority"
description = "Spark Genesis Harness canonical authority kernel, schemas, ledger, registry, readiness, and self-evolution contracts."
homepage = "https://github.com/vibeforge1111/spark-harness-core"

[provides]
capabilities = [
  "spark.harness.core",
  "spark.turn_intent",
  "spark.authorization",
  "spark.tool_ledger",
  "spark.readiness",
  "spark.self_evolution",
]

[needs]
modules = []
capabilities = []
secrets = []

[claims]
secrets = []
ports = []
routes = []

[profiles.genesis_harness]
default = true
